name: Build WireGuardKit xcframework

# Compiles WireGuard (Swift + C + the Go engine) into a finished, distributable
# WireGuardKit.xcframework and publishes it as a GitHub Release. The VPN app then
# consumes that prebuilt binary instead of building the Swift Package from source
# — which is what Xcode 26 cannot do (the "unable to resolve module dependency:
# WireGuardKitC/WireGuardKitGo" failure).
#
# Goes in the wireguard-apple fork at: .github/workflows/xcframework.yml
# Run it from the repo's "Actions" tab (workflow_dispatch) or on push to master.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"

permissions:
  contents: write # needed to create the Release

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode / SDK
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21.13"
          cache: false

      # 1) Build the WireGuard Go engine as a static lib for iOS arm64 (device).
      #    No goruntime patch -> robust against the exact Go version.
      - name: Build libwg-go.a (iOS arm64)
        working-directory: Sources/WireGuardKitGo
        run: |
          set -euxo pipefail
          SDKROOT="$(xcrun --sdk iphoneos --show-sdk-path)"
          CC_BIN="$(xcrun --sdk iphoneos -f clang)"
          FLAGS="-isysroot $SDKROOT -arch arm64 -miphoneos-version-min=16.4"
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 CC="$CC_BIN" \
            CGO_CFLAGS="$FLAGS" CGO_LDFLAGS="$FLAGS" \
            go build -trimpath -ldflags=-w -buildmode=c-archive -o libwg-go.a .
          rm -f libwg-go.h
          lipo -info libwg-go.a

      # 2) Build WireGuardKit as a distributable dynamic framework (device), then
      #    wrap it into an xcframework. We use `xcodebuild build` (not `archive`)
      #    into a derivedData dir and pick the framework out of Build/Products —
      #    this avoids the "scheme not configured for archive" quirk of bare SPM
      #    packages. On any failure we surface xcodebuild's real error lines as
      #    ::error:: annotations (readable via the GitHub API).
      - name: Build framework + create xcframework
        run: |
          set -uo pipefail
          DD="$PWD/build/dd"
          LOG="$PWD/build/xcodebuild.log"
          mkdir -p build

          # The fork also contains the official WireGuard.xcodeproj. When both a
          # .xcodeproj and Package.swift exist, xcodebuild targets the project and
          # can't see the package's "WireGuardKit" scheme. Remove the app project
          # (and any workspace) so xcodebuild builds the Swift package instead.
          rm -rf WireGuard.xcodeproj ./*.xcworkspace 2>/dev/null || true

          { echo "=== swift --version ==="; swift --version 2>&1; \
            echo "=== xcodebuild -version ==="; xcodebuild -version 2>&1; \
            echo "=== xcodebuild -list ==="; xcodebuild -list 2>&1; \
            echo "=== Package.swift ==="; cat Package.swift; \
            echo "=== begin xcodebuild build ==="; } | tee "$LOG"

          set -x
          xcodebuild archive \
            -scheme WireGuardKit \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/WireGuardKit-iOS.xcarchive" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.4 \
            LIBRARY_SEARCH_PATHS="$PWD/Sources/WireGuardKitGo" \
            OTHER_LDFLAGS="-lwg-go -framework CoreFoundation -framework Security -lresolv" \
            2>&1 | tee -a "$LOG"
          rc=${PIPESTATUS[0]}
          set +x

          if [ "$rc" -ne 0 ]; then
            echo "::group::xcodebuild tail"; tail -80 "$LOG" || true; echo "::endgroup::"
            grep -iE "error:|is not currently configured|does not contain|cannot|no such|unable|ld: |linker|module" "$LOG" | tail -25 | while IFS= read -r line; do echo "::error::$line"; done
            exit "$rc"
          fi

          ARCH="$PWD/build/WireGuardKit-iOS.xcarchive"
          echo "Searching for archived framework..."
          find "$ARCH/Products" -name "WireGuardKit.framework" -type d -print || true
          FW="$(find "$ARCH/Products" -name "WireGuardKit.framework" -type d | head -1)"
          if [ -z "$FW" ]; then
            echo "::error::WireGuardKit.framework not found in xcarchive"
            find "$ARCH/Products" -maxdepth 4 -print | head -120 | while IFS= read -r p; do echo "::error::FOUND $p"; done
            exit 1
          fi
          echo "Framework at: $FW"; find "$FW" -maxdepth 2 -print

          # Hard requirement: the framework MUST contain its Swift module, else the
          # consumer gets "no such module 'WireGuardKit'" (this is what `xcodebuild
          # build` got wrong — it left the swiftmodule as a sibling of the .framework).
          if [ ! -d "$FW/Modules/WireGuardKit.swiftmodule" ]; then
            echo "::error::framework is missing Modules/WireGuardKit.swiftmodule"
            ls -la "$FW/Modules" 2>&1 | while IFS= read -r l; do echo "::error::$l"; done
            exit 1
          fi
          echo "OK: framework contains Modules/WireGuardKit.swiftmodule"

          xcodebuild -create-xcframework -framework "$FW" -output "$PWD/build/WireGuardKit.xcframework" 2>&1 | tee -a "$LOG"
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            grep -iE "error:|unable|cannot|does not contain" "$LOG" | tail -25 | while IFS= read -r line; do echo "::error::$line"; done
            exit "$rc"
          fi

          # Verify the module survived into the xcframework.
          if ! find "$PWD/build/WireGuardKit.xcframework" -path "*Modules/WireGuardKit.swiftmodule*" | grep -q .; then
            echo "::error::xcframework is missing the Swift module"
            find "$PWD/build/WireGuardKit.xcframework" -print | head -60 | while IFS= read -r p; do echo "::error::$p"; done
            exit 1
          fi
          echo "OK: xcframework contains the Swift module"
          (cd build && zip -r -y WireGuardKit.xcframework.zip WireGuardKit.xcframework)

      # 4) Compute the SwiftPM checksum used by the binaryTarget(...) in Package.swift.
      - name: Compute SPM checksum
        id: checksum
        run: |
          set -euxo pipefail
          CS="$(swift package compute-checksum build/WireGuardKit.xcframework.zip)"
          echo "checksum=$CS" >> "$GITHUB_OUTPUT"
          echo "=============================================="
          echo " SPM checksum: $CS"
          echo "=============================================="

      # 5) Publish the zip as a Release asset.
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xcframework-${{ github.run_number }}
          name: WireGuardKit xcframework build ${{ github.run_number }}
          body: |
            WireGuardKit.xcframework — iOS arm64 (device), built with library evolution.

            SPM checksum (paste into Package.swift binaryTarget):
            `${{ steps.checksum.outputs.checksum }}`
          files: build/WireGuardKit.xcframework.zip

      # On failure, publish the full xcodebuild log to a `ci-logs` branch so it
      # can be inspected via the GitHub contents API (the raw Actions log host is
      # not reachable from all environments). Pushing to ci-logs does not
      # re-trigger this workflow (it only runs on master / manual dispatch).
      - name: Publish log on failure
        if: failure()
        run: |
          set -e
          mkdir -p /tmp/lp && tail -300 "$PWD/build/xcodebuild.log" > /tmp/lp/ci-log.txt 2>/dev/null || echo "no xcodebuild.log produced" > /tmp/lp/ci-log.txt
          cd "$RUNNER_TEMP"
          rm -rf logpush && mkdir logpush && cd logpush
          git init -q
          git switch --orphan ci-logs
          cp /tmp/lp/ci-log.txt ci-log.txt
          git add ci-log.txt
          git -c user.email=ci@local -c user.name=ci commit -q -m "CI log run ${{ github.run_number }}"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" ci-logs
